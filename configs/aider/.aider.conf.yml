# Aider configuration for offline use with Ollama
# Place this at ~/.aider.conf.yml on the Ubuntu laptop

# Default model (best quality)
model: ollama/qwen3.5:35b

# Git integration
auto-commits: true
dirty-commits: false

# Editor model (fast, for small edits)
editor-model: ollama/qwen3.5:9b

# Behavior
stream: true
pretty: true
dark-mode: true
